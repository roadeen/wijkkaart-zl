name: Update Map

on:
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:

permissions:
  contents: write  
  
jobs:
  update-map:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas folium gspread oauth2client PyGithub
      
      - name: Run map generation script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON_ZL }}
        run: |
          python generate_map.py
